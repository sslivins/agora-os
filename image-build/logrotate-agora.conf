# /etc/logrotate.d/agora — caps total /var/log usage at ~1 GB (D56).
#
# /var/log lives on the persistent data partition via bind-mount, so without
# a cap a long-lived device would eventually fill the SD card. Weekly
# rotation with 7 rotations retained gives 8 weeks of history within the cap.

/var/log/*.log /var/log/agora/*.log {
    weekly
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root adm
    maxsize 128M
    # 7 rotations × 128M = 896M, comfortably under 1 GB.
}
