# Enable persistent journald storage on /var/log/journal/.
#
# Without this drop-in, systemd-journald's default (Storage=auto) falls
# back to volatile (in-memory) storage on first boot because the
# /var/log/journal/ directory does not exist in the rootfs, and remains
# volatile forever. The symptom is `journalctl -b -1` returning
#     Specifying boot ID or boot offset has no effect,
#     no persistent journal was found
# which makes post-mortems of the previous boot (e.g. why agora-slot-mgr
# decided to promote-or-revert across a tryboot) impossible.
#
# `Storage=persistent` tells journald to (a) create
# /var/log/journal/<machine-id>/ if it does not exist and (b) prefer
# disk over /run for journal files. Combined with the D56 bind-mount of
# /var/log -> /data/var-log/, this means journals live on the data
# partition and survive both reboots and slot flips.
#
# SystemMaxUse keeps journal storage bounded so a chatty service
# can't fill /data. logrotate caps text logs separately (D56,
# logrotate-agora.conf, ~1 GB total).
[Journal]
Storage=persistent
SystemMaxUse=200M
