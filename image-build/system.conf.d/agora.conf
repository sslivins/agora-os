[Manager]
# Disable systemd's hardware-watchdog ownership of /dev/watchdog0 so that the
# python agora-watchdog.service can hold it instead. Without this, systemd
# grabs the device at PID 1 startup and agora-watchdog hits EBUSY on open(),
# fails 5 restart attempts, and the unit goes failed.
#
# We keep the python watchdog (not switch to systemd's RuntimeWatchdog) because
# it can ping conditional on agora-app health, not just systemd liveness.
RuntimeWatchdogSec=0
