# Build and sign the agora-os image on every tag push.
#
# Flow (per Phase 0 plan, D53/D55):
#   1. Checkout this repo on a GitHub-hosted arm64 runner (D55: no qemu).
#   2. Clone pi-gen at a pinned SHA, drop our stage-agora overlay into it.
#   3. Run pi-gen via build-docker.sh to build a stock Bookworm arm64
#      rootfs (the overlay is a no-op placeholder today -- TODO
#      p0-pi-gen-overlay-followup).
#   4. Split pi-gen's output .img into boot + rootfs tarballs.
#   5. Run image-build/assemble.sh to lay out the 5-partition GPT image
#      with both root slots, EEPROM templates, and dual pubkeys.
#   6. Sign agora-os-*.img.xz with minisign using MINISIGN_SECRET.
#   7. Attach .img.xz + .minisig to a draft GitHub Release.
#
# This pipeline borrows its pi-gen prelude from sslivins/agora's mature
# build-image.yml: native arm64 runner (no qemu cross-build), build-docker.sh
# (container-isolated pi-gen so the host stays clean), 5-min keepalive to
# survive GHA's silent-job-killer, FIRST_USER_PASS set so pi-gen's
# stage1/01-sys-tweaks doesn't refuse to build.
#
# What we deliberately keep different from agora/build-image.yml:
#   - DEPLOY_COMPRESSION=none (we losetup the .img immediately to split it).
#   - Single board for now (matrix-per-board is a separate followup --
#     would change output filename contract).
#   - The unique post-pi-gen steps below: split, assemble, minisign, release.
#
# Hardening (D53):
#   - All actions pinned by full SHA.
#   - pi-gen pinned by full SHA.
#   - MINISIGN_SECRET scoped to the sign step only.
#   - workflow_dispatch enabled for manual builds during development; the
#     real release path is tag push to v*.
#
# Branch protection on .github/workflows/* must be configured manually in
# the GitHub UI (settings -> Branches -> protect main, restrict path).
# See image-build/README.md.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # softprops/action-gh-release needs this to create the release

# Don't kick off two concurrent runs for the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # NOTE: pinned to RPi-Distro/pi-gen master HEAD as of 2026-04-16.
  # Bump deliberately by editing this SHA + re-running the workflow.
  PI_GEN_COMMIT: d01290946bae8acba172d99c8d4aa3fb335fcf6d

jobs:
  build:
    name: build + sign agora-os image
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180

    steps:
      - name: Checkout agora-os
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Free disk space on runner
        # pi-gen's debootstrap + Docker layers can balloon past the
        # ~30 GB of free space ubuntu-24.04-arm ships with -- run #25821558614
        # blew up extracting ca-certificates from stage1 with "No space left
        # on device". Reclaim the pre-installed toolchains we don't use so
        # pi-gen's stage tarballs have room to land.
        #
        # All paths guarded with `|| true` because the exact set of
        # pre-installed toolchains varies by runner image version + arch;
        # on arm64 most of these are smaller-or-absent vs x64. The `df -h`
        # bookends give us a paper trail if a future image change wipes out
        # one of these directories and the gain shrinks.
        run: |
          set -eux
          echo "--- disk before cleanup ---"
          df -h /
          # Big-ticket toolchains we never touch.
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/microsoft || true
          # Hosted toolcache for languages we don't use in this pipeline
          # (Node, Python, Ruby, Go, .NET). pi-gen runs entirely inside
          # Docker, so the host runner does not need any of these.
          sudo rm -rf /opt/hostedtoolcache/node || true
          sudo rm -rf /opt/hostedtoolcache/Ruby || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /opt/hostedtoolcache/PyPy || true
          # Trim APT caches; we only need the packages installed by the next
          # step, not the lists/archives that came with the runner image.
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          echo "--- disk after cleanup ---"
          df -h /

      - name: Install host dependencies
        # pi-gen itself runs inside a Docker container (build-docker.sh) so
        # we don't need debootstrap/quilt/zerofree/libarchive-tools/etc. on
        # the host. We only install what the *post*-pi-gen steps need:
        # losetup+mount+tar are in the base image, so the explicit list is
        # just the partitioning, signing, and EEPROM tools.
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdisk dosfstools e2fsprogs xz-utils zstd minisign rpi-eeprom python3

      - name: Clone pi-gen at pinned SHA
        run: |
          set -eux
          git clone https://github.com/RPi-Distro/pi-gen.git pi-gen
          cd pi-gen
          git checkout "${PI_GEN_COMMIT}"

      - name: Install stage-agora overlay into pi-gen
        run: |
          set -eux
          cp -r pi-gen-overlay/stage-agora pi-gen/stage-agora
          # Pi-gen *executes* prerun.sh and the per-substage 00-run.sh
          # files (does not source them), so they must be +x. The overlay
          # tree's stored git mode may not carry the exec bit on
          # Windows-authored checkouts; force it across the whole stage
          # (both flat scripts and substage scripts) with find so an empty
          # match doesn't fail under `set -e`.
          find pi-gen/stage-agora -name '*.sh' -exec chmod +x {} +
          # Mark this stage as the export point -- pi-gen will build a .img
          # from its rootfs. Earlier stages do not run export-image.
          touch pi-gen/stage-agora/EXPORT_IMAGE
          # Skip noobs and avoid building stages we don't need.
          touch pi-gen/stage2/SKIP_IMAGES
          # Disable the desktop / full stages entirely.
          for s in stage3 stage4 stage5; do
            if [ -d "pi-gen/$s" ]; then
              touch "pi-gen/$s/SKIP" "pi-gen/$s/SKIP_IMAGES"
            fi
          done

      - name: Write pi-gen config
        run: |
          set -eux
          # FIRST_USER_PASS is required by pi-gen's stage1/01-sys-tweaks
          # unless DISABLE_FIRST_BOOT_USER_RENAME=1 AND no first-boot user
          # rename happens. Setting both belt-and-suspenders matches what
          # sslivins/agora's build-image.yml does and keeps pi-gen happy.
          # Default user is agora/agora; first-boot configuration replaces
          # this on real deployments via /boot/firmware/agora-fleet.env.
          # DEPLOY_COMPRESSION=none because the next step losetup-mounts
          # the .img immediately to split it; xz would just be a detour.
          cat > pi-gen/config <<'EOF'
          IMG_NAME='agora-os-base'
          RELEASE='trixie'
          TARGET_HOSTNAME='agora'
          FIRST_USER_NAME='agora'
          FIRST_USER_PASS='agora'
          DISABLE_FIRST_BOOT_USER_RENAME=1
          STAGE_LIST='stage0 stage1 stage2 stage-agora'
          ENABLE_SSH=1
          DEPLOY_COMPRESSION='none'
          EOF
          echo "--- pi-gen config ---"
          cat pi-gen/config

      - name: Build with pi-gen (build-docker.sh + keepalive)
        # build-docker.sh runs pi-gen inside a Docker container. The host
        # stays clean -- no host-side debootstrap, no chroot, no losetup
        # ownership headaches. Keepalive prints a timestamp every 5 min so
        # GHA doesn't kill the job for "no output" during long debootstrap
        # phases. See sslivins/agora/.github/workflows/build-image.yml.
        run: |
          set -eux
          cd pi-gen
          chmod +x build-docker.sh

          while true; do
            sleep 300
            echo "$(date -u '+%H:%M:%S') [keepalive] pi-gen still running..."
          done &
          KEEPALIVE_PID=$!

          ./build-docker.sh
          BUILD_EXIT=$?

          kill $KEEPALIVE_PID 2>/dev/null || true
          exit $BUILD_EXIT

      - name: Locate pi-gen output image
        id: piout
        run: |
          set -eux
          IMG=$(sudo find pi-gen/deploy -maxdepth 2 -name '*agora-os-base*.img' | head -n1)
          if [ -z "$IMG" ]; then
            echo "no pi-gen .img produced" >&2
            sudo ls -laR pi-gen/deploy || true
            exit 1
          fi
          echo "img=${IMG}" >> "$GITHUB_OUTPUT"

      - name: Split pi-gen image into boot + rootfs tarballs
        env:
          PIGEN_IMG: ${{ steps.piout.outputs.img }}
        run: |
          set -eux
          sudo mkdir -p /tmp/agora-build
          sudo cp "$PIGEN_IMG" /tmp/agora-build/pigen.img

          # Loop-attach with partition scanning. pi-gen produces a 2-partition
          # MBR image: p1 = FAT boot (/boot/firmware/), p2 = ext4 root.
          LOOP=$(sudo losetup --find --show --partscan /tmp/agora-build/pigen.img)
          echo "attached at $LOOP"

          sudo mkdir -p /tmp/agora-build/{boot,root}
          sudo mount "${LOOP}p1" /tmp/agora-build/boot
          sudo mount "${LOOP}p2" /tmp/agora-build/root

          # Tar boot partition contents. These end up on our boot-A / boot-B
          # FAT partitions in assemble.sh.
          sudo tar -C /tmp/agora-build/boot -cf /tmp/agora-build/boot.tar .

          # Tar root partition contents. The rootfs's /boot/firmware/ mount
          # point will be empty at extract time -- our assemble.sh leaves it
          # as a mount point since the per-slot fstab points it at boot-A or
          # boot-B respectively.
          sudo tar -C /tmp/agora-build/root \
            --exclude='./boot/firmware/*' \
            -cf /tmp/agora-build/rootfs.tar .

          sudo umount /tmp/agora-build/boot
          sudo umount /tmp/agora-build/root
          sudo losetup -d "$LOOP"

          ls -la /tmp/agora-build/

      - name: Reclaim disk space after split
        # By this point boot.tar + rootfs.tar are sufficient to feed both
        # assemble.sh and build-bundle.sh; everything else from the pi-gen
        # build is dead weight (~13 GB on the arm runner). Without this,
        # assemble.sh ENOSPC's mid-tar-extract on the loopback rootfs.
        run: |
          set -eux
          echo "=== before reclaim ==="
          df -h /
          # pi-gen/ holds the entire stage1+stage2+stage-agora work tree
          # (~10 GB) plus the deploy/ .img we already cp'd to /tmp.
          sudo rm -rf pi-gen
          # The cp of pi-gen's .img is no longer needed; we have it split.
          sudo rm -f /tmp/agora-build/pigen.img
          # Drop the Docker overlayfs layers from build-docker.sh; the only
          # thing we needed out of it was pi-gen's deploy/.img, already
          # extracted and split above. Keeping these around adds another
          # ~2-4 GB of pressure on /. 'system prune -af' nukes images +
          # build cache; --volumes also clears any pi-gen named volumes.
          sudo docker system prune -af --volumes || true
          echo "=== after reclaim ==="
          df -h /

      - name: Assemble 5-partition agora-os image
        run: |
          set -eux
          # Defensive: a Windows-authored repo can re-introduce non-executable
          # .sh files into the index. Force +x so 'command not found' cannot
          # masquerade as a real assemble failure.
          chmod +x image-build/*.sh image-build/firstboot/*.sh
          OUT_IMG_XZ="/tmp/agora-build/agora-os-${GITHUB_REF_NAME:-dev}.img.xz"
          # AGORA_OS_VERSION: strip the leading 'v' from refs like 'v0.0.4-test'
          # so /etc/agora/version reads '0.0.4-test', matching semver-shape.
          # AGORA_APP_FLOOR: operator-managed floor pinned in the committed
          # image-build/agora-app-floor.txt — bump when shipping a rootfs
          # whose contract requires a newer agora-app. Pass values through
          # sudo explicitly (sudo strips env by default; explicit assignment
          # is safer than relying on sudoers env_keep config).
          AGORA_OS_VERSION="${GITHUB_REF_NAME#v}"
          AGORA_OS_VERSION="${AGORA_OS_VERSION:-dev}"
          AGORA_APP_FLOOR="$(cat image-build/agora-app-floor.txt)"
          sudo \
            AGORA_OS_VERSION="$AGORA_OS_VERSION" \
            AGORA_APP_FLOOR="$AGORA_APP_FLOOR" \
            image-build/assemble.sh \
            /tmp/agora-build/rootfs.tar \
            /tmp/agora-build/boot.tar \
            "$OUT_IMG_XZ"
          # assemble.sh runs as root, so /tmp/agora-build/ + the new .img.xz
          # are owned by root. Hand the directory back to the runner user so
          # the (unprivileged) minisign step can write the sibling .minisig.
          sudo chown -R "$(id -u):$(id -g)" /tmp/agora-build
          sudo ls -la /tmp/agora-build/
          echo "OUT_IMG_XZ=${OUT_IMG_XZ}" >> "$GITHUB_ENV"

      - name: Build OTA bundle
        # Consumes the exact same boot.tar + rootfs.tar that assemble.sh
        # used (D62) — they're still on disk in /tmp/agora-build/. The
        # bundle producer strips /etc/machine-id and /etc/ssh/ssh_host_*
        # from rootfs.tar before packing (D63); the apply-time D60 copy
        # step on the device re-instates the device's own identity.
        #
        # Runs under sudo for the same reason assemble.sh does: rootfs.tar
        # contains /dev/* character devices and `tar -xf` requires
        # CAP_MKNOD to recreate them. Without sudo the extract fails with
        # "Cannot mknod: Operation not permitted" on the first device
        # entry (./dev/ptmx). D62 also requires the bundle's root/ tree
        # to be byte-identical to assemble.sh's slot A — which means we
        # must preserve the static /dev/* nodes, not skip them with
        # --exclude. After the script runs we hand /tmp/agora-build back
        # to the runner user so the subsequent (unprivileged) minisign
        # step can write the sibling .minisig.
        run: |
          set -eux
          OUT_BUNDLE="/tmp/agora-build/agora-bundle-${GITHUB_REF_NAME:-dev}.tar.zst"
          # Same env-var contract as the assemble.sh step above. Both
          # scripts run in this single job so they share one source of
          # truth for the version + app-floor values (D62 byte-parity
          # between slot A and slot B).
          AGORA_OS_VERSION="${GITHUB_REF_NAME#v}"
          AGORA_OS_VERSION="${AGORA_OS_VERSION:-dev}"
          AGORA_APP_FLOOR="$(cat image-build/agora-app-floor.txt)"
          sudo \
            AGORA_OS_VERSION="$AGORA_OS_VERSION" \
            AGORA_APP_FLOOR="$AGORA_APP_FLOOR" \
            image-build/build-bundle.sh \
            /tmp/agora-build/rootfs.tar \
            /tmp/agora-build/boot.tar \
            "${GITHUB_REF_NAME:-dev}" \
            "$OUT_BUNDLE"
          sudo chown -R "$(id -u):$(id -g)" /tmp/agora-build
          ls -la /tmp/agora-build/
          echo "OUT_BUNDLE=${OUT_BUNDLE}" >> "$GITHUB_ENV"

      - name: Sign image with minisign
        # MINISIGN_SECRET is the full contents of the minisign .key file
        # (generated offline via `minisign -G -W ...`, paper-backed, then
        # pasted into the repo secret). The -W means no password, which is
        # what minisign expects when feeding the key via stdin or a file in
        # CI. See image-build/README.md for the keypair ceremony.
        env:
          MINISIGN_SECRET: ${{ secrets.MINISIGN_SECRET }}
        run: |
          set -eux
          if [ -z "$MINISIGN_SECRET" ]; then
            echo "MINISIGN_SECRET is not set -- configure it in repo Settings -> Secrets -> Actions" >&2
            exit 1
          fi
          KEYFILE="$(mktemp)"
          umask 077
          printf '%s\n' "$MINISIGN_SECRET" > "$KEYFILE"
          # -W => key has no password, signing is non-interactive.
          # We add a trusted comment with the tag for forensic clarity.
          TAG="${GITHUB_REF_NAME:-dev}"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          minisign -S -W \
            -s "$KEYFILE" \
            -t "agora-os ${TAG} built by GH Actions on ${BUILT_AT}" \
            -m "$OUT_IMG_XZ"
          # Sign the OTA bundle with the same keypair — devices verify
          # against the same /etc/agora/update-pubkey.pem baked into their
          # rootfs by assemble.sh.
          minisign -S -W \
            -s "$KEYFILE" \
            -t "agora-bundle ${TAG} built by GH Actions on ${BUILT_AT}" \
            -m "$OUT_BUNDLE"
          shred -u "$KEYFILE" || rm -f "$KEYFILE"
          sudo ls -la "$(dirname "$OUT_IMG_XZ")"

      - name: Smoke-test signatures against committed pubkey
        # This is the cross-repo sanity check: confirm the MINISIGN_SECRET
        # baked into agora-os's GH Actions matches the public key
        # committed at image-build/update-pubkey.pem (and therefore baked
        # into the rootfs by assemble.sh, and therefore the key the
        # device-side verifier will use to check OTA bundles).
        #
        # A mismatch is silent and catastrophic — every OTA in the fleet
        # would fail with a generic "bad signature" that's painful to
        # debug from telemetry alone. Catching it here means the release
        # never gets cut.
        #
        # We verify both artifacts because they share the same keypair:
        # if either passes the other will too, but checking both keeps
        # the failure mode unambiguous when one is corrupted in transit.
        run: |
          set -eux
          minisign -V \
            -p image-build/update-pubkey.pem \
            -m "$OUT_IMG_XZ"
          minisign -V \
            -p image-build/update-pubkey.pem \
            -m "$OUT_BUNDLE"
          echo "smoke test: image + bundle both verify against committed update-pubkey.pem"

      - name: Compute checksums
        run: |
          set -eux
          cd "$(dirname "$OUT_IMG_XZ")"
          sha256sum "$(basename "$OUT_IMG_XZ")" > "$(basename "$OUT_IMG_XZ").sha256"
          # The bundle's .sha256 is already emitted by build-bundle.sh.

      - name: Generate catalog.json
        # Emit the manifest that the agora-cms Imager UI consumes
        # (shared/services/imager_catalog.py). Schema mirrors the one
        # sslivins/agora's build-image.yml produces so a single CMS
        # imager_catalog parser handles both feeds:
        #
        #   {
        #     "schemaVersion": 1,
        #     "generatedAt": "<utc iso8601>",
        #     "version": "<tag>",
        #     "variants": [
        #       {
        #         "variant": "pi5",
        #         "version": "<tag>",
        #         "filename": "agora-os-<tag>.img.xz",
        #         "url": "https://github.com/.../releases/download/<tag>/...",
        #         "sha256": "<hex>",
        #         "compressedBytes": <int>,
        #         "uncompressedBytes": <int>
        #       }
        #     ]
        #   }
        #
        # agora-os is pi5-only by design (D52/D55), hence the single
        # variant entry. If we ever add pi4 / zero2w builds, this step
        # grows additional entries (or graduates to a matrix-fanout +
        # publish-catalog aggregator job like sslivins/agora has).
        #
        # The OTA bundle (.tar.zst) is deliberately NOT in catalog.json
        # — that artifact is delivered to already-paired devices via
        # the CMS device-upgrade API, not via the Imager flash-from-SD
        # flow. Mirroring sslivins/agora's catalog contract.
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd "$(dirname "$OUT_IMG_XZ")"
          TAG="${GITHUB_REF_NAME}"
          FILENAME="$(basename "$OUT_IMG_XZ")"
          SHA256="$(awk '{print $1}' "${FILENAME}.sha256")"
          COMPRESSED_BYTES="$(stat -c%s "$FILENAME")"
          # `xz --robot --list` prints a tab-separated table; the row
          # whose first column is "totals" carries the uncompressed
          # stream size in column 5. Reading metadata only — no decompress.
          UNCOMPRESSED_BYTES="$(xz --robot --list "$FILENAME" | awk '$1=="totals"{print $5}')"
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          URL="https://github.com/${REPO}/releases/download/${TAG}/${FILENAME}"

          export TAG FILENAME SHA256 COMPRESSED_BYTES UNCOMPRESSED_BYTES GENERATED_AT URL
          python3 <<'PY'
          import json, os

          catalog = {
              "schemaVersion": 1,
              "generatedAt": os.environ["GENERATED_AT"],
              "version": os.environ["TAG"],
              "variants": [
                  {
                      "variant": "pi5",
                      "version": os.environ["TAG"],
                      "filename": os.environ["FILENAME"],
                      "url": os.environ["URL"],
                      "sha256": os.environ["SHA256"],
                      "compressedBytes": int(os.environ["COMPRESSED_BYTES"]),
                      "uncompressedBytes": int(os.environ["UNCOMPRESSED_BYTES"]),
                  }
              ],
          }
          with open("catalog.json", "w") as f:
              json.dump(catalog, f, indent=2, sort_keys=True)
              f.write("\n")
          print("--- catalog.json ---")
          print(open("catalog.json").read())
          PY

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          # Auto-publish all tags as full releases for now so the agora-cms
          # Imager UI's `releases/latest/download/catalog.json` consumer
          # tracks the newest -test build during pre-v1 bring-up.
          # TODO(post-v1.0.0): flip -test/-rc tags to prerelease so they
          # don't shadow real semver releases. Sketch:
          #   prerelease: ${{ contains(github.ref_name, '-') }}
          draft: false
          generate_release_notes: true
          files: |
            /tmp/agora-build/agora-os-*.img.xz
            /tmp/agora-build/agora-os-*.img.xz.minisig
            /tmp/agora-build/agora-os-*.img.xz.sha256
            /tmp/agora-build/agora-bundle-*.tar.zst
            /tmp/agora-build/agora-bundle-*.tar.zst.minisig
            /tmp/agora-build/agora-bundle-*.tar.zst.sha256
            /tmp/agora-build/catalog.json
